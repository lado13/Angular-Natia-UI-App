<svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blurEffect" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#1a0b2e" />

  <g filter="url(#blurEffect)">
    
    <circle cx="150" cy="150" r="250" fill="#99f6ff" opacity="0.4">
      <animate attributeName="cx" values="150;250;150" dur="15s" repeatCount="indefinite" />
      <animate attributeName="cy" values="150;100;150" dur="18s" repeatCount="indefinite" />
    </circle>

    <circle cx="650" cy="450" r="300" fill="#7c3aed" opacity="0.5">
      <animate attributeName="cx" values="650;550;650" dur="20s" repeatCount="indefinite" />
      <animate attributeName="cy" values="450;550;450" dur="22s" repeatCount="indefinite" />
    </circle>

    <ellipse cx="400" cy="300" rx="300" ry="200" fill="#c026d3" opacity="0.3">
      <animate attributeName="rx" values="300;450;300" dur="25s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="12s" repeatCount="indefinite" />
    </ellipse>

    <circle cx="700" cy="50" r="150" fill="#e0f2fe" opacity="0.2">
      <animate attributeName="cx" values="700;400;700" dur="30s" repeatCount="indefinite" />
    </circle>
  </g>

  <rect width="100%" height="100%" fill="white" opacity="0.02" style="mix-blend-mode: overlay;" />
</svg>